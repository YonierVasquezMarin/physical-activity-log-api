services:
  physical-activity-log-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: physical-activity-log-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: development
      DATABASE_URL: jdbc:postgresql://postgres:5432/physical_activity_log
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - physical-activity-log-network

  postgres:
    image: postgres:16-alpine
    container_name: physical-activity-log-db
    environment:
      POSTGRES_DB: physical_activity_log
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d physical_activity_log"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - physical-activity-log-network

networks:
  physical-activity-log-network:
    driver: bridge

volumes:
  postgres_data:
